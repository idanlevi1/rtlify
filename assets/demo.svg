<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" fill="none">
  <defs>
    <linearGradient id="tbg" x1="0" y1="0" x2="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#181825"/>
    </linearGradient>
  </defs>

  <!-- Window frame -->
  <rect width="820" height="520" rx="12" fill="url(#tbg)"/>
  <rect width="820" height="40" rx="12" fill="#313244"/>
  <rect y="28" width="820" height="12" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="20" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="20" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="20" r="6" fill="#a6e3a1"/>

  <!-- Title bar -->
  <text x="410" y="25" text-anchor="middle" font-family="SF Mono, Consolas, monospace" font-size="12" fill="#6c7086">~/my-project</text>

  <!-- Line 1: command -->
  <text x="24" y="72" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#a6e3a1">$</tspan><tspan fill="#cdd6f4"> npx rtlify init</tspan>
  </text>

  <!-- Line 3: prompt -->
  <text x="24" y="108" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#cdd6f4" font-weight="bold">  rtlify</tspan><tspan fill="#6c7086"> v0.1.0</tspan>
  </text>

  <text x="24" y="140" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#cdd6f4" font-weight="bold">  Does this project use i18n?</tspan><tspan fill="#6c7086"> (react-i18next, next-intl)</tspan>
  </text>

  <text x="24" y="164" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#a6e3a1">    y</tspan><tspan fill="#cdd6f4">  AI wraps text in t('key')</tspan>
  </text>
  <text x="24" y="182" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#89b4fa">    n</tspan><tspan fill="#cdd6f4">  AI writes text inline</tspan>
  </text>

  <text x="24" y="210" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#cdd6f4" font-weight="bold">  ></tspan><tspan fill="#cdd6f4"> i18n? </tspan><tspan fill="#6c7086">[y/N]</tspan><tspan fill="#f9e2af"> n</tspan>
  </text>

  <!-- Success output -->
  <text x="24" y="246" font-family="SF Mono, Consolas, monospace" font-size="13" fill="#a6e3a1" font-weight="bold">  RTLify initialized</text>

  <text x="24" y="274" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#a6e3a1">  +</tspan><tspan fill="#cdd6f4"> .rtlify-rules.md </tspan><tspan fill="#6c7086">(full ruleset)</tspan>
  </text>
  <text x="24" y="294" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#a6e3a1">  +</tspan><tspan fill="#cdd6f4"> Claude Code </tspan><tspan fill="#6c7086">(pointer added)</tspan>
  </text>
  <text x="24" y="314" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#a6e3a1">  +</tspan><tspan fill="#cdd6f4"> Cursor </tspan><tspan fill="#6c7086">(pointer added)</tspan>
  </text>
  <text x="24" y="334" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#a6e3a1">  +</tspan><tspan fill="#cdd6f4"> /rtlify slash command</tspan>
  </text>

  <text x="24" y="362" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#6c7086">  Mode</tspan><tspan fill="#cdd6f4">    </tspan><tspan fill="#89b4fa">hardcoded</tspan><tspan fill="#cdd6f4"> — AI writes text inline</tspan>
  </text>
  <text x="24" y="382" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#6c7086">  Config</tspan><tspan fill="#cdd6f4">  .rtlifyrc.json</tspan>
  </text>

  <!-- Divider -->
  <line x1="24" y1="404" x2="796" y2="404" stroke="#313244" stroke-width="1"/>

  <!-- Check command -->
  <text x="24" y="428" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#a6e3a1">$</tspan><tspan fill="#cdd6f4"> npx rtlify check</tspan>
  </text>

  <text x="24" y="456" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#89b4fa">  src/components/Card.tsx</tspan>
  </text>
  <text x="24" y="476" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#6c7086">       3</tspan><tspan fill="#cdd6f4"> </tspan><tspan fill="#f9e2af">Tailwind Physical</tspan>
  </text>
  <text x="24" y="494" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#6c7086">         Use logical classes (ms-*, me-*, ps-*, pe-*)</tspan>
  </text>
  <text x="24" y="512" font-family="SF Mono, Consolas, monospace" font-size="13">
    <tspan fill="#f38ba8">         &lt;div className="ml-4 pl-6 text-left"&gt;</tspan>
  </text>
</svg>
