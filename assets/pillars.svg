<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0e1a"/>
      <stop offset="100%" stop-color="#141828"/>
    </linearGradient>
    <linearGradient id="purpleGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <linearGradient id="tealGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#5eead4"/>
    </linearGradient>
    <linearGradient id="amberGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="340" rx="16" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.5" fill="#1e293b"/>
  </pattern>
  <rect width="840" height="340" rx="16" fill="url(#dots)"/>

  <!-- Title -->
  <text x="420" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="800" fill="#e2e8f0" letter-spacing="1">RTLify</text>
  <text x="420" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#475569" letter-spacing="3">THE THREE PILLARS</text>

  <!-- Pillar 1: RTL Brain -->
  <rect x="30" y="76" width="248" height="240" rx="10" fill="#110f24" stroke="#2d2553" stroke-width="1" filter="url(#softShadow)"/>
  <rect x="30" y="76" width="248" height="3" rx="1.5" fill="url(#purpleGlow)"/>
  <text x="154" y="116" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30">🧠</text>
  <text x="154" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">The RTL Brain</text>
  <text x="154" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#a78bfa" letter-spacing="1.5">RULES INJECTION</text>
  <line x1="90" y1="180" x2="218" y2="180" stroke="#2d2553" stroke-width="1"/>
  <text x="154" y="202" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Logical CSS Properties</text>
  <text x="154" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Tailwind Class Mapping</text>
  <text x="154" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Icon Flipping &amp; BDI Safety</text>
  <text x="154" y="262" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">i18n &amp; React Native RTL</text>
  <rect x="74" y="284" width="160" height="16" rx="8" fill="#a78bfa" opacity="0.12"/>
  <text x="154" y="296" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#a78bfa">5 AI editors supported</text>

  <!-- Connector 1-2 -->
  <line x1="282" y1="196" x2="296" y2="196" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="293" cy="196" r="2" fill="#475569"/>

  <!-- Pillar 2: RTL Linter -->
  <rect x="298" y="76" width="248" height="240" rx="10" fill="#081a15" stroke="#1a3d2d" stroke-width="1" filter="url(#softShadow)"/>
  <rect x="298" y="76" width="248" height="3" rx="1.5" fill="url(#tealGlow)"/>
  <text x="422" y="116" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30">🔍</text>
  <text x="422" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">RTL Linter</text>
  <text x="422" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#2dd4bf" letter-spacing="1.5">CODE SCANNER</text>
  <line x1="358" y1="180" x2="486" y2="180" stroke="#1a3d2d" stroke-width="1"/>
  <text x="422" y="202" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Physical CSS Detection</text>
  <text x="422" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Tailwind Violation Flags</text>
  <text x="422" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Hardcoded String Alerts</text>
  <text x="422" y="262" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">CI-Ready (exit code 1)</text>
  <rect x="342" y="284" width="160" height="16" rx="8" fill="#2dd4bf" opacity="0.12"/>
  <text x="422" y="296" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#2dd4bf">npx rtlify check</text>

  <!-- Connector 2-3 -->
  <line x1="550" y1="196" x2="564" y2="196" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="561" cy="196" r="2" fill="#475569"/>

  <!-- Pillar 3: Agent Action -->
  <rect x="566" y="76" width="248" height="240" rx="10" fill="#1a1508" stroke="#3d3019" stroke-width="1" filter="url(#softShadow)"/>
  <rect x="566" y="76" width="248" height="3" rx="1.5" fill="url(#amberGlow)"/>
  <text x="690" y="116" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="30">🪄</text>
  <text x="690" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Agent Action</text>
  <text x="690" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#fbbf24" letter-spacing="1.5">SLASH COMMAND</text>
  <line x1="626" y1="180" x2="754" y2="180" stroke="#3d3019" stroke-width="1"/>
  <text x="690" y="202" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Scan &amp; Auto-Refactor</text>
  <text x="690" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Verify Zero Violations</text>
  <text x="690" y="242" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">One-Command Project Fix</text>
  <text x="690" y="262" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" fill="#94a3b8">Claude Code Native</text>
  <rect x="610" y="284" width="160" height="16" rx="8" fill="#fbbf24" opacity="0.12"/>
  <text x="690" y="296" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="600" fill="#fbbf24">/rtlify in Claude Code</text>
</svg>
